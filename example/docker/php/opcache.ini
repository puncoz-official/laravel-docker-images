; OPcache — production tuning for Laravel.

opcache.enable = 1
opcache.enable_cli = 0

opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.max_wasted_percentage = 10

; Code is immutable inside the image — never re-check timestamps.
; If you bind-mount source for dev, override this to `1` in a dev-only ini.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

opcache.save_comments = 1
opcache.fast_shutdown = 1

; Send fatal errors / warnings to stderr (caught by Docker logs)
opcache.log_verbosity_level = 1
opcache.error_log = /proc/self/fd/2
