; Laravel production runtime overrides — applied on top of php.ini-production.

memory_limit = 512M

; File upload / form post sizes
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Request lifetime
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000

; Locale / safety
date.timezone = UTC
expose_php = Off

; Realpath cache — significant win for Laravel's many `require`s
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Error handling — log to stderr so Docker captures it
log_errors = On
error_log = /proc/self/fd/2
display_errors = Off
display_startup_errors = Off

; Sessions (prefer Redis/database in Laravel config; this is the fallback)
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
