[www]
user = www-data
group = www-data

listen = 9000

; Process manager — `dynamic` works well for steady traffic; switch to `static`
; for predictable memory under high load, or `ondemand` for low-traffic / dev.
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Health / observability endpoints (mount them in your web server if you want)
pm.status_path = /status
ping.path = /ping

; Pass container env vars through to PHP — Laravel reads config() via env().
clear_env = no

; Send worker output + slow request log to stderr (Docker logs)
catch_workers_output = yes
decorate_workers_output = no
access.log = /proc/self/fd/2
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s
